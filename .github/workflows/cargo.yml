name: cargo

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31

      - name: Build
        run: nix develop --command cargo build

      - name: Test
        run: nix develop --command cargo test
